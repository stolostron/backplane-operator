apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  annotations:
    cert-manager.io/inject-ca-from: multicluster-engine/mce-capm3-serving-cert
  labels:
    cluster.x-k8s.io/provider: infrastructure-metal3
  name: mce-capm3-mutating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  - v1beta1
  clientConfig:
    service:
      name: mce-capm3-webhook-service
      namespace: '{{ default "multicluster-engine" .Values.global.namespace }}'
      path: /mutate-infrastructure-cluster-x-k8s-io-v1beta2-metal3cluster
  failurePolicy: Fail
  matchPolicy: Equivalent
  name: default.metal3cluster.infrastructure.cluster.x-k8s.io
  rules:
  - apiGroups:
    - infrastructure.cluster.x-k8s.io
    apiVersions:
    - v1beta2
    operations:
    - CREATE
    - UPDATE
    resources:
    - metal3clusters
  sideEffects: None
- admissionReviewVersions:
  - v1
  - v1beta1
  clientConfig:
    service:
      name: mce-capm3-webhook-service
      namespace: '{{ default "multicluster-engine" .Values.global.namespace }}'
      path: /mutate-infrastructure-cluster-x-k8s-io-v1beta2-metal3remediationtemplate
  failurePolicy: Fail
  matchPolicy: Equivalent
  name: default.metal3remediationtemplate.infrastructure.cluster.x-k8s.io
  rules:
  - apiGroups:
    - infrastructure.cluster.x-k8s.io
    apiVersions:
    - v1beta2
    operations:
    - CREATE
    - UPDATE
    resources:
    - metal3remediationtemplates
  sideEffects: None
