apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: '{{ .Values.org }}:{{ .Chart.Name }}:tls-profile-sync'
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: '{{ .Values.org }}:{{ .Chart.Name }}:tls-profile-sync'
subjects:
- kind: ServiceAccount
  name: cluster-manager
  namespace: '{{ .Values.global.namespace }}'
