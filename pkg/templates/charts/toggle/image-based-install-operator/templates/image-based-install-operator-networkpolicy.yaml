apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: image-based-install-operator
  labels:
    app: image-based-install-operator
spec:
  podSelector:
    matchLabels:
      app: image-based-install-operator
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Same-namespace traffic
    - from:
        - podSelector: {}
    # Metrics scraping from openshift-monitoring
    - from:
        - namespaceSelector:
            matchLabels:
              network.openshift.io/policy-group: monitoring
      ports:
        - protocol: TCP
          port: 8080
    # Webhook calls from kube-apiserver
    - ports:
        - protocol: TCP
          port: 9443
    # Image server - Ironic/BMC downloads ISOs (source IPs vary)
    - ports:
        - protocol: TCP
          port: 8000
  egress:
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-dns
      ports:
        - protocol: UDP
          port: 5353
        - protocol: TCP
          port: 5353
    # Kubernetes API and spoke cluster API servers (dynamic IPs)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
        - ipBlock:
            cidr: ::/0
      ports:
        - protocol: TCP
          port: 6443
    # HTTPS egress (registries, external services)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 169.254.169.254/32
        - ipBlock:
            cidr: ::/0
      ports:
        - protocol: TCP
          port: 443
