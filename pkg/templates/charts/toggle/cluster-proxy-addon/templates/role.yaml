apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: open-cluster-management:cluster-proxy:addon-manager
  # ACM override: upstream uses  .Release.Namespace . Backplane rendering engine
  # injects namespace from MCE spec.targetNamespace via Go Values struct.
  namespace: '{{ .Values.global.namespace }}'
rules:
  - apiGroups:
      - ""
    resources:
      - services
      - events
      - serviceaccounts
    verbs:
      - "*"
  - apiGroups:
      - "apps"
    resources:
      - deployments
      - deployments/scale
    verbs:
      - "*"
  - apiGroups:
      - ""
    resources:
      - configmaps
    verbs:
      - get
      - create
      - update
      - patch
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - get
      - create
      - update
      - patch
